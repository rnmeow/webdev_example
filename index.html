<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>前後端交互演示</title>

    <style type="text/css">
      .targ {
        font-size: larger;
        font-family: Roboto, Arial, Helvetica, 'Source Han Sans TC', 'Noto Sans TC', sans-serif;
      }
    </style>
  </head>

  <body>
    <p class="targ">
      You did not connect to the backend. 後端未連接。
    </p>

    <script type="text/javascript">
      document.addEventListener('DOMContentLoaded', () => {
        fetch("http://127.0.0.1:5000")
          // parse JSON for next step
          .then((resp) => resp.json())
          // load field in JSON and fill into DOM
          .then((parJson) => {
            document.querySelector('.targ').textContent = parJson.text
          })

        return
      })
    </script>
  </body>
</html>
